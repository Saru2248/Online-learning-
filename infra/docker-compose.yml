version: "3.9"

# ─────────────────────────────────────────────────────────
#  EduFlow — Full Stack Docker Compose
#  Services: PostgreSQL, Redis, Meilisearch, API, Reco, Web
# ─────────────────────────────────────────────────────────

services:
  # ─── PostgreSQL Database ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: eduflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eduflow_password}
      POSTGRES_DB: ${POSTGRES_DB:-eduflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduflow_network

  # ─── Redis Cache ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eduflow_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduflow_network

  # ─── Meilisearch Full-Text Search ────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: eduflow_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterKey}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - eduflow_network

  # ─── NestJS Backend API ───────────────────────────────
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: eduflow_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-eduflow_password}@postgres:5432/${POSTGRES_DB:-eduflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILISEARCH_KEY:-masterKey}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      RECO_SERVICE_URL: http://reco:8000
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - eduflow_network

  # ─── FastAPI Recommendation Service ──────────────────
  reco:
    build:
      context: ../apps/reco
      dockerfile: Dockerfile
    container_name: eduflow_reco
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-eduflow_password}@postgres:5432/${POSTGRES_DB:-eduflow}
      API_URL: http://api:4000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eduflow_network

  # ─── Next.js Frontend ─────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: eduflow_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - eduflow_network

# ─── Volumes ──────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────
networks:
  eduflow_network:
    driver: bridge
